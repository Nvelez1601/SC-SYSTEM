<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/usm-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:;">
    <title>USM Community Service Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script>var dragEvent = null;</script>
    <!-- DEBUG BANNER + ROOT WATCHER: included in production build to aid diagnosing blank renderer -->
    <div id="__debug_banner" style="position:fixed;left:8px;top:8px;z-index:99999;padding:6px 10px;background:rgba(255,0,0,0.06);color:#900;border-radius:6px;font-family:monospace;">DEBUG: index source</div>
    <script>
      (function(){
        console.log('[debug] document.readyState=', document.readyState);
        try{
          const root = document.getElementById('root');
          console.log('[debug] #root found=', !!root);
          console.log('[debug] #root innerHTML length=', root ? root.innerHTML.length : 'no-root');
          if(root){
            let last = root.childElementCount;
            let lastSnapshot = root.innerHTML;
            const obs = new MutationObserver((muts)=>{
              try{
                console.log('[debug] #root mutations, childCount=', root.childElementCount);
                console.log('[debug] mutationRecords=', muts.map(m=>({type:m.type, added:m.addedNodes?.length||0, removed:m.removedNodes?.length||0})));
                // If children changed, dump a small snapshot of innerHTML
                if(root.childElementCount !== last){
                  console.log('[debug] #root childCount changed', last, '=>', root.childElementCount);
                  try{
                    const snap = root.innerHTML || '';
                    console.log('[debug] #root snapshot (first 2000 chars):', snap.slice(0,2000));
                    lastSnapshot = snap;
                  }catch(e){ console.error('[debug] error reading innerHTML', e && e.stack || e); }
                  last = root.childElementCount;
                }
              }catch(inner){ console.error('[debug] mutation observer error', inner && inner.stack || inner); }
            });
            obs.observe(root, { childList: true, subtree: true });
            // Periodic check as fallback
            setInterval(()=>{
              try{
                if(!root) return;
                if(root.childElementCount !== last){
                  console.log('[debug] #root childCount now', root.childElementCount);
                  try{ console.log('[debug] #root snapshot (first 2000 chars):', (root.innerHTML||'').slice(0,2000)); }catch(e){}
                  last = root.childElementCount;
                }
              }catch(e){ console.error('[debug] interval error', e && e.stack || e); }
            }, 500);
          }
        }catch(e){ console.error('[debug] error checking root', e && e.stack || e); }
        window.addEventListener('error', (ev)=>{ console.error('[debug][window.error]', ev && ev.error ? ev.error.stack || ev.error.message : ev.message); });
        window.addEventListener('unhandledrejection', (ev)=>{ console.error('[debug][unhandledrejection]', ev.reason && (ev.reason.stack || ev.reason.message) || ev.reason); });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
